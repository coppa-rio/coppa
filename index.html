<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Em Breve</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: rgba(255,255,255,0.08);
      --accent: #7c6aff;
      --accent2: #ff6a9c;
      --text: #f0f0f5;
      --muted: #7070a0;
    }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      overflow: hidden;
    }
 
    /* background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: var(--accent2);
      bottom: -100px; right: -100px;
    }
 
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      max-width: 600px;
      animation: fadeUp 0.8s ease both;
    }
 
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .badge {
      background: rgba(124, 106, 255, 0.15);
      border: 1px solid rgba(124, 106, 255, 0.3);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border-radius: 999px;
    }
 
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 400;
      text-align: center;
      line-height: 1.2;
    }
 
    h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
 
    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 300;
      text-align: center;
    }
 
    /* search form */
    form {
      width: 100%;
      display: flex;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.5rem;
      transition: border-color 0.3s;
    }
 
    form:focus-within {
      border-color: rgba(124, 106, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(124, 106, 255, 0.1);
    }
 
    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      padding: 0.6rem 0.8rem;
    }
 
    input::placeholder { color: var(--muted); }
 
    button[type="submit"] {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }
 
    button[type="submit"]:hover { opacity: 0.85; transform: scale(1.03); }
    button[type="submit"]:active { transform: scale(0.97); }
 
    /* quick buttons */
    .quick-label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      align-self: flex-start;
    }
 
    .quick-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      width: 100%;
    }
 
    .quick-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      padding: 0.4rem 1rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
 
    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(124, 106, 255, 0.08);
    }
 
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }
 
    .footer {
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">🚧 Em construção</span>
 
    <h1>Enquanto nosso site<br>não fica pronto,<br><span>dê uma googlada</span></h1>
    <p class="subtitle">Tenha só um pouco de paciência, você não se arrependerá ;]</p>
 
    <form action="https://www.google.com/search" method="GET" target="_blank">
      <input type="text" name="q" placeholder="O que você quer pesquisar?">
      <button type="submit">Buscar →</button>
    </form>
 
    <span class="quick-label">Buscas rápidas</span>
    <div class="quick-buttons">
      <a class="quick-btn" href="https://www.google.com/search?q=notícias+hoje" target="_blank">📰 Notícias</a>
      <a class="quick-btn" href="https://www.google.com/search?q=clima+agora" target="_blank">☀️ Clima</a>
      <a class="quick-btn" href="https://www.google.com/search?q=restaurantes+perto+de+mim" target="_blank">🍽️ Restaurantes</a>
      <a class="quick-btn" href="https://www.google.com/search?q=filmes+em+cartaz" target="_blank">🎬 Filmes</a>
    </div>
 
    <div class="divider"></div>
    <p class="footer">Voltaremos em breve. Prometemos. 🤙</p>
  </div>
</body>
</html>
